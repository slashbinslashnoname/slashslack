services:
  app:
    build: .
    container_name: slashslack
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?set a strong secret in .env — e.g. `openssl rand -hex 24`}
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/uploads
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
